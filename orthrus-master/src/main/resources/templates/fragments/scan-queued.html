<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- SCAN QUEUED PANEL — injected by HTMX after form submit -->
<div th:fragment="scanQueued" class="accordion-item bg-transparent border-secondary" th:id="'scan-tracker-' + ${jobId}">
    <h2 class="accordion-header" th:id="'heading-' + ${jobId}">
        <button class="accordion-button bg-dark text-light border-secondary" th:classappend="${status == 'PENDING' or status == 'RUNNING'} ? '' : 'collapsed'" type="button" data-bs-toggle="collapse" th:data-bs-target="'#collapse-' + ${jobId}" th:aria-expanded="${status == 'PENDING' or status == 'RUNNING'} ? 'true' : 'false'" th:aria-controls="'collapse-' + ${jobId}">
            <div class="d-flex align-items-center w-100 me-3">
                <span th:id="'accordion-badge-' + ${jobId}" class="me-3 badge" th:classappend="${status == 'PENDING' ? 'bg-secondary' : (status == 'RUNNING' ? 'bg-warning text-dark' : (status == 'FAILED' ? 'bg-danger' : 'bg-success'))}" th:text="${status}">STATUS</span>
                <strong>#<span th:text="${jobId}"></span></strong> 
                <span class="text-muted mx-2">&bull;</span>
                <span class="text-light" th:text="${discovererId != null ? discovererId : 'openapi'}">openapi</span>
                <span class="mx-2">&mdash;</span>
                <span th:text="${target}"></span>
                
                <div th:id="'accordion-pdf-container-' + ${jobId}" class="ms-auto d-flex align-items-center" th:style="${status == 'COMPLETED'} ? 'display: flex;' : 'display: none;'">
                    <div th:if="${status == 'COMPLETED'}" th:class="'grade-badge grade-' + ${globalGrade} + ' me-3'" th:text="${globalGrade}" style="width: 28px; height: 28px; font-size: 14px; padding: 0; line-height: 1; margin: 0; display: flex !important; justify-content: center; align-items: center;">A</div>
                    <span th:if="${status == 'COMPLETED'}" th:data-pdf-url="@{'/web/scans/' + ${resultId} + '/pdf'}" onclick="window.location.href=this.getAttribute('data-pdf-url'); event.stopPropagation();" class="btn btn-sm btn-outline-info" title="Download PDF Report" style="z-index: 10;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M14 14V4.5L9.5 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2M9.5 3A1.5 1.5 0 0 0 11 4.5h2V14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h5.5z"></path><path d="M4.603 14.087a.8.8 0 0 1-.438-.42c-.195-.388-.13-.776.08-1.102.198-.307.526-.568.897-.787a7.7 7.7 0 0 1 1.482-.645 20 20 0 0 0 1.062-2.227 7.3 7.3 0 0 1-.43-1.295c-.086-.4-.119-.796-.046-1.136.075-.354.274-.672.65-.823.192-.077.4-.12.602-.077a.7.7 0 0 1 .471.246c.11.164.128.379.052.565-.05.122-.11.246-.179.37-.152.28-.35.53-.559.734a9 9 0 0 0-.22 1.036c.264.444.57.854.915 1.22.428.455.88.85 1.343 1.18.52.368 1.05.656 1.425.845.39.196.65.37.785.58.125.195.125.41.01.625-.115.215-.34.34-.61.42-.27.08-.59.1-.92-.02a4.9 4.9 0 0 1-1.3-.8c-.46-.35-.87-.75-1.21-1.16a13 13 0 0 1-1.6.5c-.56.1-1.1.21-1.6.35-.4.1-1.1.28-1.5.42a4 4 0 0 1-.6.18c-.28.06-.55.08-.8.06zm1.2-1.7c-.17.15-.31.33-.42.54-.1.2-.14.38-.1.52.02.08.06.13.1.16.1.06.26.04.47-.05.21-.1.46-.24.75-.43-.3-.15-.6-.31-.8-.74zm3.9-3.4c.3-.5.6-1 1-1.5.06-.1.12-.2.18-.3-.06-.06-.13-.12-.2-.18a2.5 2.5 0 0 0-.58-.42c-.2.24-.4.5-.58.8a12 12 0 0 0 .18 1.6zm2.3 2.6c.36-.2.66-.43.9-.68-.24-.2-.5-.4-.76-.6-.18.25-.33.52-.45.8.1.16.2.33.31.48zm-4.7-3.1a2 2 0 0 0-.6-.3c.1-.1.2-.2.3-.3.1-.1.2-.2.3-.3a2 2 0 0 0 0 .6h-.01z"></path></svg>
                    </span>
                </div>
            </div>
        </button>
    </h2>
    <div th:id="'collapse-' + ${jobId}" class="accordion-collapse collapse" th:classappend="${status == 'PENDING' or status == 'RUNNING'} ? 'show' : ''" th:aria-labelledby="'heading-' + ${jobId}" data-bs-parent="#scansAccordion">
        <div class="accordion-body glass-card border-0" style="margin: 0; border-radius: 0;">

    <!-- Header -->
    <div th:if="${status == 'PENDING' or status == 'RUNNING'}" class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-3">
        <div>
            <h3 class="mb-0" th:id="'scan-status-title-' + ${jobId}">
                <span th:if="${status == 'PENDING' or status == 'RUNNING'}" class="spinner-border spinner-border-sm text-primary me-2" role="status"></span>
                <span th:text="${status == 'PENDING' ? 'Scan Queued' : 'Scan Running...'}">Scan Queued</span>
            </h3>
        </div>
        <div th:id="'scan-actions-' + ${jobId}" style="display: none;">
            <!-- PDF button will appear here once completed dynamically -->
        </div>
    </div>

    <!-- Progress Timeline -->
    <div id="scan-timeline" class="mb-4">
        <div class="d-flex align-items-center mb-3">
            <div class="scan-step" th:classappend="${status == 'PENDING' ? 'active' : 'done'}" th:id="'step-pending-' + ${jobId}">
                <div class="scan-step-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71z"/>
                        <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16m7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0"/>
                    </svg>
                </div>
                <span class="ms-2">Queued</span>
            </div>
            <div class="scan-step-line"></div>
            <div class="scan-step" th:classappend="${status == 'RUNNING' ? 'active' : (status == 'COMPLETED' or status == 'FAILED' ? 'done' : '')}" th:id="'step-running-' + ${jobId}">
                <div class="scan-step-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41m-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9"/>
                        <path fill-rule="evenodd" d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.9A5 5 0 0 0 8 3M3.1 9a5.002 5.002 0 0 0 8.757 2.182.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9z"/>
                    </svg>
                </div>
                <span class="ms-2">Running</span>
            </div>
            <div class="scan-step-line"></div>
            <div class="scan-step" th:classappend="${status == 'COMPLETED' ? 'done' : ''}" th:id="'step-completed-' + ${jobId}">
                <div class="scan-step-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M10.067.87a2.89 2.89 0 0 0-4.134 0l-.622.638-.89-.011a2.89 2.89 0 0 0-2.924 2.924l.01.89-.636.622a2.89 2.89 0 0 0 0 4.134l.637.622-.011.89a2.89 2.89 0 0 0 2.924 2.924l.89-.01.622.636a2.89 2.89 0 0 0 4.134 0l.622-.637.89.011a2.89 2.89 0 0 0 2.924-2.924l-.01-.89.636-.622a2.89 2.89 0 0 0 0-4.134l-.637-.622.011-.89a2.89 2.89 0 0 0-2.924-2.924l-.89.01zm.287 5.984-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7 8.793l2.646-2.647a.5.5 0 0 1 .708.708"/>
                    </svg>
                </div>
                <span class="ms-2">Completed</span>
            </div>
        </div>
    </div>

    <!-- Status Message -->
    <div id="scan-message" class="text-center py-4" th:style="${status == 'COMPLETED' or status == 'FAILED' ? 'display: none;' : 'display: block;'}">
        <div class="custom-spinner mb-3" th:id="'scan-spinner-' + ${jobId}"></div>
        <p class="text-light fs-5" th:id="'scan-message-text-' + ${jobId}"
           th:text="${status == 'PENDING' ? 'Scan queued — waiting for an available slave node…' : 'Scan is currently running on a slave node…'}">
            Scan queued — waiting for an available slave node…
        </p>
    </div>

    <!-- Results (hidden until completed) -->
    <div th:id="'scan-results-' + ${jobId}" th:style="${status == 'COMPLETED' ? 'display: block;' : 'display: none;'}">
        <th:block th:if="${status == 'COMPLETED' and result != null}">
            <div th:replace="~{fragments/results :: resultsPanel}"></div>
        </th:block>
        <th:block th:if="${status == 'COMPLETED' and result == null}">
            <div class="alert alert-warning">No results available for this scan.</div>
        </th:block>
    </div>


    </div>
</div>
</div>
<div th:fragment="empty"></div>

</body>
</html>
