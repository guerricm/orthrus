<th:block th:fragment="items">
    <tr th:each="scan : ${history}" th:id="'job-row-' + ${scan.id}"
        th:attr="hx-get=${scan.status.name() == 'PENDING' or scan.status.name() == 'RUNNING' ? '/api/scans/row/' + scan.id : null},hx-trigger=${scan.status.name() == 'PENDING' or scan.status.name() == 'RUNNING' ? 'every 5s' : null},hx-swap=${scan.status.name() == 'PENDING' or scan.status.name() == 'RUNNING' ? 'outerHTML' : null}">
        <td class="bg-transparent border-secondary" style="padding: 1rem; vertical-align: middle;">
            <strong class="text-light" th:text="'#' + ${scan.id}">#1</strong>
        </td>
        <td class="bg-transparent border-secondary" style="padding: 1rem; vertical-align: middle;" th:text="${#temporals.format(scan.createdAt, 'HH:mm:ss dd/MM/yyyy')}">10:00 01/01/2026</td>
        <td class="bg-transparent border-secondary" style="padding: 1rem; vertical-align: middle; word-break: break-all;" th:text="${scan.target}">https://api.example.com</td>
        <td class="bg-transparent border-secondary" style="padding: 1rem; vertical-align: middle;">
            <span th:id="'job-status-' + ${scan.id}" th:class="'badge ' + (${scan.status.name() == 'PENDING'} ? 'bg-secondary' : (${scan.status.name() == 'RUNNING'} ? 'bg-primary' : (${scan.status.name() == 'COMPLETED'} ? 'bg-success' : (${scan.status.name() == 'CANCELLED'} ? 'bg-dark' : 'bg-danger'))))" th:text="${scan.status}">COMPLETED</span>
        </td>
        <td class="bg-transparent border-secondary" style="padding: 1rem; vertical-align: middle;" th:text="${scan.formattedDuration}">5s</td>
        
        <td class="bg-transparent border-secondary text-center" style="padding: 1rem; vertical-align: middle;" th:id="'job-vulns-' + ${scan.id}">
            <span th:if="${scan.vulnsCount != null}" class="badge bg-danger rounded-pill px-3 py-2" th:text="${scan.vulnsCount}">5</span>
            <span th:if="${scan.vulnsCount == null}" class="text-muted">-</span>
        </td>
        
        <td class="bg-transparent border-secondary text-center" style="padding: 1rem; vertical-align: middle;" th:id="'job-tests-' + ${scan.id}">
            <span th:if="${scan.testsCount != null}" th:text="${scan.testsCount}">437</span>
            <span th:if="${scan.testsCount == null}" class="text-muted">-</span>
        </td>
        
        <td class="bg-transparent border-secondary text-end" style="padding: 1rem; vertical-align: middle; min-width: 100px;" th:id="'job-actions-' + ${scan.id}">
            <a th:if="${scan.resultId != null}" th:href="@{/web/scans/{id}/pdf(id=${scan.resultId})}" class="btn btn-sm btn-outline-info" title="Download PDF Report" download>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M14 14V4.5L9.5 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2M9.5 3A1.5 1.5 0 0 0 11 4.5h2V14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h5.5z"/><path d="M4.603 14.087a.8.8 0 0 1-.438-.42c-.195-.388-.13-.776.08-1.102.198-.307.526-.568.897-.787a7.7 7.7 0 0 1 1.482-.645 20 20 0 0 0 1.062-2.227 7.3 7.3 0 0 1-.43-1.295c-.086-.4-.119-.796-.046-1.136.075-.354.274-.672.65-.823.192-.077.4-.12.602-.077a.7.7 0 0 1 .471.246c.11.164.128.379.052.565-.05.122-.11.246-.179.37-.152.28-.35.53-.559.734a9 9 0 0 0-.22 1.036c.264.444.57.854.915 1.22.428.455.88.85 1.343 1.18.52.368 1.05.656 1.425.845.39.196.65.37.785.58.125.195.125.41.01.625-.115.215-.34.34-.61.42-.27.08-.59.1-.92-.02a4.9 4.9 0 0 1-1.3-.8c-.46-.35-.87-.75-1.21-1.16a13 13 0 0 1-1.6.5c-.56.1-1.1.21-1.6.35-.4.1-1.1.28-1.5.42a4 4 0 0 1-.6.18c-.28.06-.55.08-.8.06zm1.2-1.7c-.17.15-.31.33-.42.54-.1.2-.14.38-.1.52.02.08.06.13.1.16.1.06.26.04.47-.05.21-.1.46-.24.75-.43-.3-.15-.6-.31-.8-.74zm3.9-3.4c.3-.5.6-1 1-1.5.06-.1.12-.2.18-.3-.06-.06-.13-.12-.2-.18a2.5 2.5 0 0 0-.58-.42c-.2.24-.4.5-.58.8a12 12 0 0 0 .18 1.6zm2.3 2.6c.36-.2.66-.43.9-.68-.24-.2-.5-.4-.76-.6-.18.25-.33.52-.45.8.1.16.2.33.31.48zm-4.7-3.1a2 2 0 0 0-.6-.3c.1-.1.2-.2.3-.3.1-.1.2-.2.3-.3a2 2 0 0 0 0 .6h-.01z"/></svg>
            </a>
            
            <form th:if="${scan.status != null and (scan.status.name() == 'FAILED' or scan.status.name() == 'COMPLETED' or scan.status.name() == 'RUNNING' or scan.status.name() == 'CANCELLED')}"
                  th:action="@{'/system/jobs/' + ${scan.id} + '/restart'}" method="post" class="d-inline">
                <button type="submit" class="btn btn-sm btn-outline-warning ms-1" title="Restart Scan Job"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/></svg></button>
            </form>
            
            <form th:if="${scan.status != null and (scan.status.name() == 'PENDING' or scan.status.name() == 'RUNNING')}"
                  th:action="@{'/scans/' + ${scan.id} + '/cancel'}" method="post" class="d-inline ms-1">
                <button type="submit" class="btn btn-sm btn-outline-danger" title="Stop Scan Job"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-stop-circle" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/><path d="M5 6.5A1.5 1.5 0 0 1 6.5 5h3A1.5 1.5 0 0 1 11 6.5v3A1.5 1.5 0 0 1 9.5 11h-3A1.5 1.5 0 0 1 5 9.5z"/></svg></button>
            </form>
        </td>
    </tr>
</th:block>
