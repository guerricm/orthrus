<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main}, 'Orthrus DAST - Scan Details')}">
<body>
<main>
    <div class="row justify-content-center">
        <div class="col-lg-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Scan Details #<span th:text="${scanId}"></span></h2>
                <div>
                    <a th:href="@{'/web/scans/' + ${resultId} + '/pdf'}" class="btn btn-outline-info me-2">Download PDF</a>
                    <button onclick="history.back()" class="btn btn-outline-secondary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left me-2" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/></svg>Back to History
                    </button>
                </div>
            </div>
            
            <div class="glass-card mb-4 p-4">
                <h4 class="mb-3 border-bottom border-secondary pb-2">Overview</h4>
                <div class="row">
                    <div class="col-md-12">
                        <p class="mb-1"><strong>Target:</strong> <span th:text="${targetUrl}"></span></p>
                        <p class="mb-0"><strong>Date:</strong> <span th:text="${scanDate}"></span></p>
                    </div>
                </div>
            </div>

            <div class="glass-card mb-4 p-4">
                <h4 class="mb-3 border-bottom border-secondary pb-2">Vulnerabilities Summary</h4>
                <div class="row align-items-center mb-5">
                    <div class="col-md-4 text-center">
                        <h5 class="text-light opacity-75 mb-3">Global Grade</h5>
                        <div th:class="'grade-badge grade-' + ${globalGrade}" th:text="${globalGrade}">A</div>
                    </div>
                    
                    <div class="col-md-8">
                        <div class="row g-3">
                            <div class="col-6 col-md-4">
                                <div class="stat-box border-secondary">
                                    <div class="stat-value text-secondary" th:text="${totalVulns}">0</div>
                                    <div class="stat-label">Total</div>
                                </div>
                            </div>
                            <div class="col-6 col-md-4">
                                <div class="stat-box border-danger">
                                    <div class="stat-value text-critical" th:text="${countCritical}">0</div>
                                    <div class="stat-label text-critical">Critical</div>
                                </div>
                            </div>
                            <div class="col-6 col-md-4">
                                <div class="stat-box border-warning">
                                    <div class="stat-value text-high" th:text="${countHigh}">0</div>
                                    <div class="stat-label text-high">High</div>
                                </div>
                            </div>
                            <div class="col-6 col-md-4">
                                <div class="stat-box" style="border-color: var(--grade-c);">
                                    <div class="stat-value text-medium" th:text="${countMedium}">0</div>
                                    <div class="stat-label text-medium">Medium</div>
                                </div>
                            </div>
                            <div class="col-6 col-md-4">
                                <div class="stat-box" style="border-color: var(--grade-a);">
                                    <div class="stat-value text-low" th:text="${countLow}">0</div>
                                    <div class="stat-label text-low">Low</div>
                                </div>
                            </div>
                            <div class="col-6 col-md-4">
                                <div class="stat-box border-info">
                                    <div class="stat-value text-info" th:text="${countInfo}">0</div>
                                    <div class="stat-label text-info">Info</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <table class="table table-dark table-hover mb-0" th:if="${vulnerabilities != null and !vulnerabilities.isEmpty()}">
                    <thead>
                        <tr>
                            <th class="bg-transparent border-secondary">Risk</th>
                            <th class="bg-transparent border-secondary">Vulnerability</th>
                            <th class="bg-transparent border-secondary">Endpoint</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="v : ${vulnerabilities}">
                            <td class="bg-transparent border-secondary">
                                <span th:class="'badge ' + (${v.riskLevel().name() == 'CRITICAL'} ? 'bg-danger' : (${v.riskLevel().name() == 'HIGH'} ? 'bg-warning text-dark' : (${v.riskLevel().name() == 'MEDIUM'} ? 'bg-primary' : (${v.riskLevel().name() == 'LOW'} ? 'bg-info text-dark' : 'bg-secondary'))))" th:text="${v.riskLevel()}"></span>
                            </td>
                            <td class="bg-transparent border-secondary" th:text="${v.name()}"></td>
                            <td class="bg-transparent border-secondary" style="word-break: break-all;" th:text="${v.operationUrl()}"></td>
                        </tr>
                    </tbody>
                </table>
                <div th:if="${vulnerabilities == null or vulnerabilities.isEmpty()}" class="alert alert-success bg-transparent border-success text-success mt-3">
                    No vulnerabilities found!
                </div>
            </div>

            <div th:if="${attemptGroups != null and !attemptGroups.isEmpty()}" class="glass-card mb-4 p-4">
                <h4 class="mb-3 border-bottom border-secondary pb-2">Execution Details (Audit Trail)</h4>
                
                <div th:each="group : ${attemptGroups}" class="mb-4">
                    <h5 class="text-info mb-2" th:text="${group.endpoint()}"></h5>
                    <div class="d-flex gap-2 mb-2">
                        <span class="badge bg-success" th:text="${group.passed()} + ' Passed'"></span>
                        <span th:if="${group.failed() > 0}" class="badge bg-danger" th:text="${group.failed()} + ' Failed'"></span>
                        <span th:if="${group.authError() > 0}" class="badge bg-warning text-dark" th:text="${group.authError()} + ' Auth Errors'"></span>
                        <span th:if="${group.error() > 0}" class="badge bg-secondary" th:text="${group.error()} + ' Errors'"></span>
                    </div>
                    <table class="table table-dark table-sm table-bordered border-secondary" style="font-size: 0.9em;">
                        <thead>
                            <tr>
                                <th class="bg-transparent border-secondary" style="width: 20%;">Scanner</th>
                                <th class="bg-transparent border-secondary" style="width: 60%;">Test Description</th>
                                <th class="bg-transparent border-secondary" style="width: 20%;">Result</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="attempt : ${group.attempts()}">
                                <td class="bg-transparent border-secondary" th:text="${attempt.scannerId()}"></td>
                                <td class="bg-transparent border-secondary">
                                    <span th:text="${attempt.scannerName() != null ? attempt.scannerName() : '-'}"></span>
                                </td>
                                <td class="bg-transparent border-secondary">
                                    <span th:class="'badge ' + (${attempt.status().name() == 'PASSED'} ? 'bg-success' : (${attempt.status().name() == 'FAILED'} ? 'bg-danger' : 'bg-warning text-dark'))" th:text="${attempt.status()}"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</main>
</body>
</html>
