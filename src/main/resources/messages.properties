# Descriptions
desc.CWE_287=The endpoint accepts requests that lack authorization, but returned a 2xx success code.
desc.CWE_639=User A could access data belonging to User B by manipulating object identifiers in the request.
desc.CWE_306=The endpoint exposes sensitive operations without requiring authentication.
desc.CWE_319=The endpoint transmits sensitive information (such as credentials, tokens, or PII) without TLS encryption.
desc.CWE_915=The endpoint accepts unexpected fields (e.g., 'is_admin', 'role') in the JSON payload without returning a validation error.
desc.CWE_78=The endpoint executes user-supplied commands on the underlying operating system.
desc.CWE_1336=The endpoint evaluates user input as template code, allowing arbitrary code execution on the server.
desc.CWE_209=The endpoint returns detailed error messages or stack traces when processing invalid input.
desc.CWE_22=The endpoint allows an attacker to read arbitrary files on the server filesystem.
desc.CWE_918=The endpoint appears vulnerable to SSRF. It fetched data from the internal AWS metadata service.
desc.CWE_601=The endpoint accepts user-controlled input to determine the target of an HTTP redirect.
desc.CWE_943=The endpoint might be vulnerable to NoSQL Injection (e.g., MongoDB).
desc.CWE_89=The endpoint might be vulnerable to SQL Injection.
desc.CWE_79=The endpoint reflects unencoded user input into the response.
desc.CWE_346=The CORS policy allows requests from any origin.
desc.CWE_614=Sensitive cookie in HTTPS session without the 'Secure' attribute.
desc.CWE_693=A recommended HTTP security header is missing from the response.
desc.CWE_650=The server successfully processes requests using an unusual HTTP method, which might lead to bypasses.
desc.CWE_307=The endpoint does not seem to enforce rate limiting.
desc.CWE_20=Improper validation of Content-Type. The server processed the request despite an unexpected type.
desc.CWE_913=The endpoint accepts JWTs signed with the 'none' algorithm, allowing authentication bypass.
desc.CWE_502=The endpoint accepts JWTs signed with a blank (empty) secret.

# Remediations (Format: rem.CWE_XXX=...)
rem.CWE_287=Implement a robust authentication mechanism (e.g., JWT, OAuth2) for all sensitive endpoints.
rem.CWE_639=Verify that the authenticated user actually has the authorization to access the requested resource, and do not rely solely on the provided ID.
rem.CWE_306=Require authentication for this endpoint and reject unauthenticated requests with a 401 Unauthorized status code.
rem.CWE_319=Always use HTTPS (minimum TLS 1.2) to encrypt communications between the client and the server.
rem.CWE_915=Disable mass assignment features or use strict Data Transfer Objects (DTOs) to explicitly allow only safe fields.
rem.CWE_78=Avoid executing OS commands directly. If necessary, use safe lower-level APIs and strictly validate input using an allowlist.
rem.CWE_1336=Never evaluate user input directly as template code. Use logicless templates or execute templates in a secure sandbox.
rem.CWE_209=Catch server-side exceptions and return generic error messages to the user. Never leak stack traces in production environments.
rem.CWE_22=Validate file paths against a strict allowlist and ensure resolved paths remain within the intended base directory.
rem.CWE_918=Validate user-supplied URLs against an allowlist of trusted domains and block access to internal IP addresses (e.g., 169.254.169.254, 127.0.0.1).
rem.CWE_601=Never redirect users to dynamically provided URLs without strict validation. Use internal identifiers mapped to static, safe URLs.
rem.CWE_943=Do not insert user data directly into database queries. Use secure querying features provided by your NoSQL client.
rem.CWE_89=Use parameterized queries (Prepared Statements) or ORMs. Never directly interpolate user input into SQL queries.
rem.CWE_79=Always encode user-supplied data before rendering it in the response. Use your framework's native escaping mechanisms.
rem.CWE_346=Restrict the 'Access-Control-Allow-Origin' header to a specific allowlist of trusted domains. Avoid using the wildcard (*).
rem.CWE_614=Add the 'Secure' flag to all sensitive cookies to ensure they are only transmitted over HTTPS.
rem.CWE_693=Configure appropriate HTTP security headers (Strict-Transport-Security, X-Frame-Options, X-Content-Type-Options, Content-Security-Policy).
rem.CWE_650=Explicitly reject unauthorized or unusual HTTP methods (e.g., TRACE, TRACK) with a 405 Method Not Allowed status code.
rem.CWE_307=Implement a rate-limiting mechanism to restrict the number of requests per IP or user within a given timeframe.
rem.CWE_20=Strictly validate the request's Content-Type header and reject (415 Unsupported Media Type) any unexpected formats.
rem.CWE_913=Configure your JWT library to explicitly reject the 'none' algorithm and always verify the signature using a secure key.
rem.CWE_502=Configure JWT validation to require a strong secret key and reject tokens signed with an empty or missing secret.
