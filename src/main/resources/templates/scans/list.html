<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main}, 'Orthrus DAST - Scan History')}">
<body>
<main>
    <div class="row justify-content-center">
        <div class="col-lg-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Scan History</h2>
                <a href="/scans/new" class="btn btn-primary">Start New Scan</a>
            </div>

            <div th:if="${history == null or history.isEmpty()}" class="alert alert-info bg-transparent border-info text-light d-flex align-items-center" role="alert">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-info-circle-fill me-3 flex-shrink-0" viewBox="0 0 16 16">
                  <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16m.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2"/>
                </svg>
                <div>
                  No scans have been executed yet in this session.
                </div>
            </div>

            <div class="glass-card" style="padding: 0; overflow: hidden;" th:if="${history != null and !history.isEmpty()}">
                <table class="table table-hover table-dark mb-0" style="background: transparent;">
                    <thead>
                        <tr>
                            <th class="bg-transparent border-secondary" style="padding: 1rem;">Date</th>
                            <th class="bg-transparent border-secondary" style="padding: 1rem;">Target</th>
                            <th class="bg-transparent border-secondary" style="padding: 1rem;">Duration</th>
                            <th class="bg-transparent border-secondary text-center" style="padding: 1rem;">Vulns</th>
                            <th class="bg-transparent border-secondary text-center" style="padding: 1rem;">Tests</th>
                            <th class="bg-transparent border-secondary text-end" style="padding: 1rem;">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="scan : ${history}">
                            <td class="bg-transparent border-secondary" style="padding: 1rem; vertical-align: middle;" th:text="${#temporals.format(scan.scanStartTime(), 'HH:mm:ss dd/MM/yyyy')}">10:00 01/01/2026</td>
                            <td class="bg-transparent border-secondary" style="padding: 1rem; vertical-align: middle; word-break: break-all;" th:text="${scan.targetUrl()}">https://api.example.com</td>
                            <td class="bg-transparent border-secondary" style="padding: 1rem; vertical-align: middle;" th:text="${scan.formattedDuration()}">5s</td>
                            <td class="bg-transparent border-secondary text-center" style="padding: 1rem; vertical-align: middle;">
                                <span class="badge bg-danger rounded-pill px-3 py-2" th:text="${scan.vulnerabilities().size()}">5</span>
                            </td>
                            <td class="bg-transparent border-secondary text-center" style="padding: 1rem; vertical-align: middle;" th:text="${scan.attempts() != null ? scan.attempts().size() : '-'}">
                                437
                            </td>
                            <td class="bg-transparent border-secondary text-end" style="padding: 1rem; vertical-align: middle;">
                                <a th:href="@{/web/scans/{id}/pdf(id=${scan.id()})}" class="btn btn-sm btn-outline-light" download>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-file-earmark-pdf me-2 mb-1" viewBox="0 0 16 16">
                                      <path d="M14 14V4.5L9.5 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2M9.5 3A1.5 1.5 0 0 0 11 4.5h2V14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h5.5z"/>
                                      <path d="M4.603 14.087a.8.8 0 0 1-.438-.42c-.195-.388-.13-.776.08-1.102.198-.307.526-.568.897-.787a7.7 7.7 0 0 1 1.482-.645 20 20 0 0 0 1.062-2.227 7.3 7.3 0 0 1-.43-1.295c-.086-.4-.119-.796-.046-1.136.075-.354.274-.672.65-.823.192-.077.4-.12.602-.077a.7.7 0 0 1 .471.246c.11.164.128.379.052.565-.05.122-.11.246-.179.37-.152.28-.35.53-.559.734a9 9 0 0 0-.22 1.036c.264.444.57.854.915 1.22.428.455.88.85 1.343 1.18.52.368 1.05.656 1.425.845.39.196.65.37.785.58.125.195.125.41.01.625-.115.215-.34.34-.61.42-.27.08-.59.1-.92-.02a4.9 4.9 0 0 1-1.3-.8c-.46-.35-.87-.75-1.21-1.16a13 13 0 0 1-1.6.5c-.56.1-1.1.21-1.6.35-.4.1-1.1.28-1.5.42a4 4 0 0 1-.6.18c-.28.06-.55.08-.8.06zm1.2-1.7c-.17.15-.31.33-.42.54-.1.2-.14.38-.1.52.02.08.06.13.1.16.1.06.26.04.47-.05.21-.1.46-.24.75-.43-.3-.15-.6-.31-.8-.74zm3.9-3.4c.3-.5.6-1 1-1.5.06-.1.12-.2.18-.3-.06-.06-.13-.12-.2-.18a2.5 2.5 0 0 0-.58-.42c-.2.24-.4.5-.58.8a12 12 0 0 0 .18 1.6zm2.3 2.6c.36-.2.66-.43.9-.68-.24-.2-.5-.4-.76-.6-.18.25-.33.52-.45.8.1.16.2.33.31.48zm-4.7-3.1a2 2 0 0 0-.6-.3c.1-.1.2-.2.3-.3.1-.1.2-.2.3-.3a2 2 0 0 0 0 .6h-.01z"/>
                                    </svg>
                                    Download PDF
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
