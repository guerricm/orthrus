orthrus:
  http:
    connect-timeout-ms: 5000
    read-timeout-ms: 10000
    max-redirects: 5
    ignore-ssl-errors: false

  scan:
    concurrency: 10
    include-scanners: []
    exclude-scanners: []

  report:
    default-format: json # json, sarif, html, console

  discovery:
    blackbox-max-depth: 5
    blackbox-timeout-ms: 5000

  master:
    url: http://localhost:8080
    internal-token: "change-me-in-production"

  slave:
    id: "slave-node-01"
    advertised-url: http://localhost:8081

server:
  port: 8081

spring:
  main:
    web-application-type: reactive
  codec:
    max-in-memory-size: 50MB
