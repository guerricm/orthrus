orthrus:
  http:
    connect-timeout-ms: 5000
    read-timeout-ms: 10000
    max-redirects: 5
    ignore-ssl-errors: false

  scan:
    concurrency: 10
    include-scanners: []
    exclude-scanners: []

  report:
    default-format: json # json, sarif, html, console

  discovery:
    blackbox-max-depth: 5
    blackbox-timeout-ms: 5000

  master:
    url: http://localhost:8080
    internal-token: "change-me-in-production"

  slave:
    id: ${SLAVE_ID:${HOSTNAME:localhost}:${server.port}}
    advertised-url: ${SLAVE_ADVERTISED_URL:http://${HOSTNAME:localhost}:${server.port}}

server:
  port: 8081
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  main:
    web-application-type: reactive
  codec:
    max-in-memory-size: 50MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
