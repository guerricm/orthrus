version: '3.8'

services:
  orthrus-master:
    image: nexsoltech/orthrus-master:0.0.1-SNAPSHOT # Replace with your actual registry/image tag
    container_name: orthrus-master
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - ORTHRUS_MASTER_INTERNAL_TOKEN=super-secret-internal-token
      - SPRING_R2DBC_URL=r2dbc:h2:file:////tmp/orthrus_db;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    volumes:
      - orthrus_db_data:/tmp # Mount H2 database data
    networks:
      - orthrus-network

  orthrus-slave:
    image: nexsoltech/orthrus-slave:0.0.1-SNAPSHOT # Replace with your actual registry/image tag
    container_name: orthrus-slave
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - ORTHRUS_MASTER_URL=http://orthrus-master:8080
      - ORTHRUS_MASTER_INTERNAL_TOKEN=super-secret-internal-token
      - ORTHRUS_SLAVE_ID=slave-docker-node-1
      - ORTHRUS_SLAVE_ADVERTISED_URL=http://orthrus-slave:8081
    depends_on:
      orthrus-master:
        condition: service_started
    networks:
      - orthrus-network

volumes:
  orthrus_db_data:

networks:
  orthrus-network:
    driver: bridge
