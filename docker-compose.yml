version: '3.8'

services:
  orthrus-manager:
    image: nexsoltech/orthrus-manager:0.0.1-SNAPSHOT # Replace with your actual registry/image tag
    container_name: orthrus-manager
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - ORTHRUS_MASTER_INTERNAL_TOKEN=super-secret-internal-token
      - SPRING_R2DBC_URL=r2dbc:h2:file:////tmp/orthrus_db;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
      # Uncomment and configure these variables to enable Single Sign-On (SSO) with OpenID Connect (e.g. Keycloak, Auth0)
      # - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_OIDC_CLIENT_ID=orthrus-client
      # - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_OIDC_CLIENT_SECRET=your_client_secret
      # - SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_OIDC_ISSUER_URI=https://your-idp.example.com/realms/master
      # Enable Resource Server to accept JWT Bearer tokens on the API:
      # - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=https://your-idp.example.com/realms/master
    volumes:
      - orthrus_db_data:/tmp # Mount H2 database data
    networks:
      - orthrus-network

  orthrus-worker:
    image: nexsoltech/orthrus-worker:0.0.1-SNAPSHOT # Replace with your actual registry/image tag
    container_name: orthrus-worker
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - ORTHRUS_MASTER_URL=http://orthrus-manager:8080
      - ORTHRUS_MASTER_INTERNAL_TOKEN=super-secret-internal-token
      - ORTHRUS_SLAVE_ID=slave-docker-node-1
      - ORTHRUS_SLAVE_ADVERTISED_URL=http://orthrus-worker:8081
    depends_on:
      orthrus-manager:
        condition: service_started
    networks:
      - orthrus-network

volumes:
  orthrus_db_data:

networks:
  orthrus-network:
    driver: bridge
