grade.title=Security Grade Definition
grade.a.desc=Excellent security posture. No high or critical vulnerabilities detected.
grade.b.desc=Good security posture. Minor vulnerabilities present, but no immediate critical threats.
grade.c.desc=Fair security posture. Several medium vulnerabilities or a single high vulnerability require attention.
grade.d.desc=Poor security posture. Multiple high vulnerabilities detected. Urgent remediation needed.
grade.f.desc=Critical failure. One or more critical vulnerabilities detected, exposing the application to immediate and severe risks.

