# CWE-114
cwe.CWE_114=Process Control
desc.CWE_114=The application is vulnerable to Host Header Injection, leading to potential cache poisoning or process control.
rem.CWE_114=Do not trust the Host header or X-Forwarded-Host header. Use a securely configured allowlist of trusted domains.

# CWE-235
cwe.CWE_235=Improper Handling of Extra Parameters
desc.CWE_235=The application is vulnerable to HTTP Parameter Pollution (HPP). Supplying duplicate parameters caused abnormal behavior.
rem.CWE_235=Ensure the application handles duplicate parameters safely. Frameworks should expect arrays if multiple values are permitted, or strictly reject duplicate keys.

# CWE-644
cwe.CWE_644=Improper Neutralization of HTTP Headers for Scripting Syntax
desc.CWE_644=The application fails to neutralize HTTP headers, making it vulnerable to Host Header Injection attacks.
rem.CWE_644=Validate and sanitize all HTTP headers. Avoid reflecting the Host header in links, password resets, or cache keys without strict allowlist validation.
