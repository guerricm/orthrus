report.disclaimer.title=Legal & Confidentiality Disclaimer
report.disclaimer.text=This report is STRICTLY CONFIDENTIAL and its distribution is subject to restriction. It is intended solely for authorized personnel. It is generated by an automated security testing tool (Orthrus). The tool assigns a theoretical Base CVSS score which may not reflect the environmental or temporal context of the vulnerability. The authors and the tool itself are not liable for any missed vulnerabilities, critical flaws that were not detected, or subsequent compromises of the tested systems. This tool is provided for authorized security testing only.
report.methodology.title=Methodology & Scoring Criteria
report.methodology.description=This report presents the findings of an automated Dynamic Application Security Testing (DAST) scan. The scan involved sending various malicious payloads and unexpected inputs to the target API to identify security vulnerabilities.
report.methodology.details=Orthrus utilizes an advanced taxonomy to categorize findings.<ul><li><strong>CVSS 3.1 Base Score:</strong> Provides a theoretical numerical score (0.0 to 10.0) reflecting the intrinsic qualities of a vulnerability.</li><li><strong>CAPEC:</strong> Common Attack Pattern Enumeration and Classification, identifying the specific attack mechanisms used.</li><li><strong>OWASP:</strong> Maps the findings to the latest API Security Top 10 guidelines.</li><li><strong>Global Grade:</strong> A letter grade (A to F) assessing the overall security posture based on the highest severity vulnerabilities found.</li></ul>
