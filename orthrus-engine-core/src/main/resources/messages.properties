# CWE Translations (Grouped by CWE)

# CWE-16
cwe.CWE_16=Configuration
desc.CWE_16=The application relies on an insecure configuration.
rem.CWE_16=Review the server and application configurations against security best practices and hardening guidelines.

# CWE-20
cwe.CWE_20=Improper Input Validation

# CWE-22
cwe.CWE_22=Improper Limitation of a Pathname to a Restricted Directory ('Path Traversal')
desc.CWE_22=The endpoint allows an attacker to read arbitrary files on the server filesystem.
rem.CWE_22=Validate file paths against a strict allowlist and ensure resolved paths remain within the intended base directory.

# CWE-74
cwe.CWE_74=Improper Neutralization of Special Elements in Output Used by a Downstream Component ('Injection')
desc.CWE_74=The endpoint is vulnerable to injection attacks due to improper neutralization of special elements.
rem.CWE_74=Ensure all user input is properly validated, sanitized, or encoded before being processed or interpreted by downstream components.

# CWE-78
cwe.CWE_78=Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')
desc.CWE_78=The endpoint executes user-supplied commands on the underlying operating system.
rem.CWE_78=Avoid executing OS commands directly. If necessary, use safe lower-level APIs and strictly validate input using an allowlist.

# CWE-79
cwe.CWE_79=Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')
desc.CWE_79=The endpoint reflects unencoded user input into the response.
rem.CWE_79=Always encode user-supplied data before rendering it in the response. Ensure that APIs return structured data formats (like JSON) and explicitly set the Content-Type header to application/json to prevent browser interpretation. If this is a Spring API returning Content-Type: text/plain, it is recommended to remove the manual @ExceptionHandler and rely on Spring's default error handling unless there is a specific technical or business constraint. If a manual @ExceptionHandler is required, ensure it returns a structured object (like Map or ErrorDTO) instead of a raw String to allow proper JSON conversion.

# CWE-89
cwe.CWE_89=Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')
desc.CWE_89=The endpoint might be vulnerable to SQL Injection.
rem.CWE_89=Use parameterized queries (Prepared Statements) or ORMs. Never directly interpolate user input into SQL queries.

# CWE-94
cwe.CWE_94=Improper Control of Generation of Code ('Code Injection')
desc.CWE_94=The application appears to dynamically execute user-controlled input as code.
rem.CWE_94=Avoid evaluating user input as code. If dynamic execution is necessary, strictly validate input against an allowlist and execute in an isolated sandbox.

# CWE-200
cwe.CWE_200=Exposure of Sensitive Information to an Unauthorized Actor
desc.CWE_200=The endpoint inadvertently exposes sensitive information to an unauthorized actor.
rem.CWE_200=Implement strict access controls and ensure that sensitive information is only disclosed to authorized entities.

# CWE-201
cwe.CWE_201=Insertion of Sensitive Information Into Sent Data
desc.CWE_201=The endpoint returns sensitive data that might be excessive. If this API is consumed by a client that doesn't need all these details, it violates the principle of least privilege.\n\n⚠️ **FALSE POSITIVES LIKELY: Manual validation required.** If this is an internal API designed to return full records (e.g., admin panel), this may be legitimate. However, if this is an external-facing API, ensure you implement Data Masking or use strict DTOs.
rem.CWE_201=Review the exposed fields. If the client application does not need this data to function, remove the fields from the response using dedicated Data Transfer Objects (DTOs) or apply Data Masking.

# CWE-209
cwe.CWE_209=Generation of Error Message Containing Sensitive Information
desc.CWE_209=The endpoint returns detailed error messages or stack traces when processing invalid input.
rem.CWE_209=Catch server-side exceptions and return generic error messages to the user. Never leak stack traces in production environments. Ensure APIs return error details in structured formats (like JSON) rather than plain text. If this is a Spring API returning Content-Type: text/plain, it is recommended to remove the manual @ExceptionHandler and rely on Spring's default error handling unless there is a specific technical or business constraint. If a manual @ExceptionHandler is required, ensure it returns a structured object (like Map or ErrorDTO) instead of a raw String to allow proper JSON conversion.

# CWE-285
cwe.CWE_285=Improper Authorization
desc.CWE_285=The endpoint does not properly enforce authorization checks, allowing access to restricted functionality.
rem.CWE_285=Implement robust authorization controls to verify that the authenticated user possesses the required privileges for the requested action.

# CWE-287
cwe.CWE_287=Improper Authentication
desc.CWE_287=The endpoint accepts requests that lack authorization, but returned a 2xx success code.
rem.CWE_287=Implement a robust authentication mechanism (e.g., JWT, OAuth2) for all sensitive endpoints.

# CWE-306
cwe.CWE_306=Missing Authentication for Critical Function
desc.CWE_306=The endpoint exposes sensitive operations without requiring authentication.
rem.CWE_306=Require authentication for this endpoint and reject unauthenticated requests with a 401 Unauthorized status code.

# CWE-307
cwe.CWE_307=Improper Restriction of Excessive Authentication Attempts
desc.CWE_307=The endpoint does not seem to enforce rate limiting.
rem.CWE_307=Implement a rate-limiting mechanism to restrict the number of requests per IP or user within a given timeframe.

# CWE-319
cwe.CWE_319=Cleartext Transmission of Sensitive Information
desc.CWE_319=The endpoint transmits sensitive information (such as credentials, tokens, or PII) without TLS encryption.
rem.CWE_319=Always use HTTPS (minimum TLS 1.2) to encrypt communications between the client and the server.

# CWE-327
cwe.CWE_327=Use of a Broken or Risky Cryptographic Algorithm
desc.CWE_327=The application uses a broken, risky, or deprecated cryptographic algorithm.
rem.CWE_327=Replace weak cryptographic algorithms with strong, industry-standard modern alternatives (e.g., AES-GCM, SHA-256).

# CWE-346
cwe.CWE_346=Origin Validation Error
desc.CWE_346=The CORS policy allows requests from any origin.
rem.CWE_346=Restrict the 'Access-Control-Allow-Origin' header to a specific allowlist of trusted domains. Avoid using the wildcard (*).

# CWE-347
cwe.CWE_347=Improper Verification of Cryptographic Signature
desc.CWE_347=The endpoint fails to properly verify cryptographic signatures, potentially allowing data tampering.
rem.CWE_347=Ensure all cryptographic signatures are strictly verified using the correct public keys or shared secrets before processing the data.

# CWE-352
cwe.CWE_352=Cross-Site Request Forgery (CSRF)
desc.CWE_352=The application does not implement adequate protections against Cross-Site Request Forgery (CSRF).
rem.CWE_352=Implement Anti-CSRF tokens for all state-changing operations or rely on strictly configured SameSite cookies.

# CWE-400
cwe.CWE_400=Uncontrolled Resource Consumption
desc.CWE_400=The endpoint is susceptible to uncontrolled resource consumption, which may lead to Denial of Service (DoS).
rem.CWE_400=Implement resource limits, input validation on sizes, and throttling to prevent excessive consumption of CPU, memory, or storage.

# CWE-434
cwe.CWE_434=Unrestricted Upload of File with Dangerous Type
desc.CWE_434=The endpoint allows uploading files of dangerous types without adequate restrictions.
rem.CWE_434=Strictly validate file uploads by checking the content, restricting extensions via an allowlist, and storing uploaded files outside the web root.

# CWE-444
cwe.CWE_444=Inconsistent Interpretation of HTTP Requests ('HTTP Request Smuggling')
desc.CWE_444=The application is vulnerable to HTTP Request Smuggling due to inconsistent interpretation of HTTP requests between the frontend and backend servers.
rem.CWE_444=Ensure all servers in the chain interpret HTTP requests consistently. Consider upgrading to HTTP/2, which prevents request smuggling by design.

# CWE-502
cwe.CWE_502=Deserialization of Untrusted Data
desc.CWE_502=The endpoint accepts JWTs signed with a blank (empty) secret.
rem.CWE_502=Configure JWT validation to require a strong secret key and reject tokens signed with an empty or missing secret.

# CWE-521
cwe.CWE_521=Weak Password Requirements
desc.CWE_521=The authentication endpoint allows users to authenticate using easily guessable or extremely common weak passwords.
rem.CWE_521=Implement strict password complexity requirements and an account lockout mechanism or rate limiting to prevent brute forcing.

# CWE-598
cwe.CWE_598=Information Exposure Through Query Strings in GET Request
desc.CWE_598=Sensitive information is transmitted within the URL query string.
rem.CWE_598=Transmit sensitive data in the HTTP request body (e.g., using POST requests) rather than in the query string, as URLs are often logged.

# CWE-601
cwe.CWE_601=URL Redirection to Untrusted Site ('Open Redirect')
desc.CWE_601=The endpoint accepts user-controlled input to determine the target of an HTTP redirect.
rem.CWE_601=Never redirect users to dynamically provided URLs without strict validation. Use internal identifiers mapped to static, safe URLs.

# CWE-611
cwe.CWE_611=Improper Restriction of XML External Entity Reference
desc.CWE_611=The XML parser improperly restricts XML external entities, leading to XXE injection.
rem.CWE_611=Disable the resolution of external entities (XXE) and DTDs completely in the XML parser configuration.

# CWE-614
cwe.CWE_614=Sensitive Cookie in HTTPS Session Without 'Secure' Attribute
desc.CWE_614=Sensitive cookie in HTTPS session without the 'Secure' attribute.
rem.CWE_614=Add the 'Secure' flag to all sensitive cookies to ensure they are only transmitted over HTTPS.

# CWE-639
cwe.CWE_639=Authorization Bypass Through User-Controlled Key
desc.CWE_639=User A could access data belonging to User B by manipulating object identifiers in the request.
rem.CWE_639=Verify that the authenticated user actually has the authorization to access the requested resource, and do not rely solely on the provided ID.

# CWE-650
cwe.CWE_650=Trusting HTTP Permission Methods on the Server Side
desc.CWE_650=The server successfully processes requests using an unusual HTTP method, which might lead to bypasses.
rem.CWE_650=Explicitly reject unauthorized or unusual HTTP methods (e.g., TRACE, TRACK) with a 405 Method Not Allowed status code.

# CWE-693
cwe.CWE_693=Protection Mechanism Failure
desc.CWE_693=A recommended HTTP security header is missing from the response.
rem.CWE_693=Configure appropriate HTTP security headers (Strict-Transport-Security, X-Frame-Options, X-Content-Type-Options, Content-Security-Policy).

# CWE-770
cwe.CWE_770=Allocation of Resources Without Limits or Throttling
desc.CWE_770=The application allocates resources without proper limits, potentially causing resource exhaustion.
rem.CWE_770=Define and enforce strict limits on resource allocation (e.g., max payload size, max database results) for each request.

# CWE-799
cwe.CWE_799=Improper Control of Interaction Frequency
desc.CWE_799=The application does not correctly limit the frequency of interactions from a single user or IP.
rem.CWE_799=Implement rate limiting and robust throttling policies to prevent automated abuse and brute-force attacks.

# CWE-913
cwe.CWE_913=Improper Control of Dynamically-Managed Code Resources
desc.CWE_913=The endpoint accepts JWTs signed with the 'none' algorithm, allowing authentication bypass.
rem.CWE_913=Configure your JWT library to explicitly reject the 'none' algorithm and always verify the signature using a secure key.

# CWE-915
cwe.CWE_915=Improperly Controlled Modification of Dynamically-Determined Object Attributes ('Mass Assignment')
desc.CWE_915=The endpoint accepts unexpected fields (e.g., 'is_admin', 'role') in the JSON payload without returning a validation error.
rem.CWE_915=Disable mass assignment features or use strict Data Transfer Objects (DTOs) to explicitly allow only safe fields.

# CWE-918
cwe.CWE_918=Server-Side Request Forgery (SSRF)
desc.CWE_918=The endpoint appears vulnerable to SSRF. It fetched data from the internal AWS metadata service.
rem.CWE_918=Validate user-supplied URLs against an allowlist of trusted domains and block access to internal IP addresses (e.g., 169.254.169.254, 127.0.0.1).

# CWE-942
cwe.CWE_942=Permissive Cross-domain Policy with Untrusted Domains
desc.CWE_942=The application employs a permissive cross-domain policy that trusts untrusted domains.
rem.CWE_942=Restrict cross-domain policies (like CORS) to explicitly trusted domains only, and avoid using wildcards for sensitive endpoints.

# CWE-943
cwe.CWE_943=Improper Neutralization of Special Elements in Data Query Logic
desc.CWE_943=The endpoint might be vulnerable to NoSQL Injection (e.g., MongoDB).
rem.CWE_943=Do not insert user data directly into database queries. Use secure querying features provided by your NoSQL client.

# CWE-1004
cwe.CWE_1004=Sensitive Cookie Without 'HttpOnly' Flag
desc.CWE_1004=A sensitive cookie is set without the 'HttpOnly' flag, exposing it to client-side scripts.
rem.CWE_1004=Add the 'HttpOnly' flag to all sensitive cookies (such as session IDs) to prevent them from being accessed via JavaScript.

# CWE-1021
cwe.CWE_1021=Improper Restriction of Rendered UI Layers or Frames
desc.CWE_1021=The application is vulnerable to UI redressing (Clickjacking) as it does not restrict framing.
rem.CWE_1021=Implement the X-Frame-Options or Content-Security-Policy (frame-ancestors) headers to prevent the site from being framed by unauthorized domains.

# CWE-1275
cwe.CWE_1275=Sensitive Cookie with Improper SameSite Attribute
desc.CWE_1275=A sensitive cookie does not have a properly configured SameSite attribute, increasing the risk of CSRF.
rem.CWE_1275=Configure the 'SameSite' attribute to 'Strict' or 'Lax' for all sensitive cookies to protect against cross-site request forgery attacks.

# CWE-1336
cwe.CWE_1336=Improper Neutralization of Special Elements Used in a Template Engine
desc.CWE_1336=The endpoint evaluates user input as template code, allowing arbitrary code execution on the server.
rem.CWE_1336=Never evaluate user input directly as template code. Use logicless templates or execute templates in a secure sandbox.

