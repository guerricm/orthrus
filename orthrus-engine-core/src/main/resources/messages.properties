severity.desc.critical=Critical risk vulnerabilities indicate a severe and immediate threat to the application's security. They can typically be exploited without authentication and can lead to full system compromise or significant data breach. Immediate remediation is required.
severity.desc.high=High risk vulnerabilities pose a significant threat. They often require some level of access or complex exploitation but can result in major data theft or system disruption. They should be addressed as a high priority.
severity.desc.medium=Medium risk vulnerabilities represent a moderate threat. They usually require specific preconditions or authorized access to be exploited. While not immediately critical, they should be fixed in the next scheduled update.
severity.desc.low=Low risk vulnerabilities have a minimal impact. They might expose non-sensitive information or require highly unlikely scenarios to exploit. They should be addressed when resources permit.
severity.desc.info=Informational findings do not represent a direct vulnerability but highlight security best practices that could be improved to strengthen the overall security posture.

