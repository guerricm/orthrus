# CWE Translations (Grouped by CWE)

# CWE-16
cwe.CWE_16=Mauvaise configuration de sécurité
desc.CWE_16=L'application s'appuie sur une configuration non sécurisée.
rem.CWE_16=Révisez les configurations du serveur et de l'application selon les bonnes pratiques de sécurité (hardening).

# CWE-20
cwe.CWE_20=Validation incorrecte des entrées

# CWE-22
cwe.CWE_22=Limitation incorrecte d'un chemin vers un répertoire restreint ('Path Traversal')
desc.CWE_22=Le point de terminaison permet à un attaquant de lire des fichiers arbitraires sur le système de fichiers du serveur.
rem.CWE_22=Validez les chemins de fichiers en utilisant une liste blanche stricte. Assurez-vous que les chemins résolus restent dans le répertoire de base prévu.

# CWE-74
cwe.CWE_74=Neutralisation incorrecte des éléments spéciaux dans la sortie utilisée par un composant en aval ('Injection')
desc.CWE_74=Le point de terminaison est vulnérable aux attaques par injection en raison d'une mauvaise neutralisation des éléments spéciaux.
rem.CWE_74=Assurez-vous que toutes les entrées utilisateurs sont correctement validées, nettoyées ou encodées avant d'être traitées par les composants sous-jacents.

# CWE-78
cwe.CWE_78=Neutralisation incorrecte des éléments spéciaux utilisés dans une commande système ('OS Command Injection')
desc.CWE_78=Le point de terminaison exécute des commandes fournies par l'utilisateur sur le système d'exploitation sous-jacent.
rem.CWE_78=Évitez d'exécuter des commandes système directement. Si nécessaire, utilisez des API de bas niveau sûres et validez rigoureusement les entrées (allowlist).

# CWE-79
cwe.CWE_79=Neutralisation incorrecte des entrées lors de la génération d'une page Web ('Cross-site Scripting')
desc.CWE_79=Le point de terminaison reflète l'entrée utilisateur non encodée dans la réponse.
rem.CWE_79=Encodez toujours les données fournies par l'utilisateur avant de les restituer dans la réponse. Assurez-vous que les API renvoient des formats de données structurés (comme JSON) et définissez explicitement l'en-tête Content-Type sur application/json pour éviter l'interprétation par le navigateur. S'il s'agit d'une API Spring renvoyant un Content-Type: text/plain, il est recommandé de supprimer la gestion manuelle via @ExceptionHandler au profit de celle par défaut de Spring, sauf contrainte métier ou technique. Si la gestion d'un @ExceptionHandler est obligatoire, assurez-vous qu'il renvoie un objet structuré (comme une Map ou un ErrorDTO) au lieu d'une String brute pour permettre la conversion JSON.

# CWE-89
cwe.CWE_89=Neutralisation incorrecte des éléments spéciaux dans une commande SQL ('Injection SQL')
desc.CWE_89=Le point de terminaison pourrait être vulnérable à une injection SQL.
rem.CWE_89=Utilisez des requêtes paramétrées (Prepared Statements) ou des ORM. N'interpolez jamais directement les entrées utilisateur dans des requêtes SQL.

# CWE-94
cwe.CWE_94=Contrôle incorrect de la génération de code ('Code Injection')
desc.CWE_94=L'application semble exécuter dynamiquement des entrées contrôlées par l'utilisateur sous forme de code.
rem.CWE_94=Évitez d'évaluer les entrées utilisateur comme du code. Si l'exécution dynamique est nécessaire, validez strictement avec une liste blanche et exécutez dans un bac à sable isolé.

# CWE-200
cwe.CWE_200=Exposition d'informations sensibles à un acteur non autorisé
desc.CWE_200=Le point de terminaison expose par inadvertance des informations sensibles à un acteur non autorisé.
rem.CWE_200=Mettez en place des contrôles d'accès stricts et assurez-vous que les informations sensibles ne sont divulguées qu'aux entités autorisées.

# CWE-201
cwe.CWE_201=Insertion d'informations sensibles dans les données envoyées (CWE-201)
desc.CWE_201=Le point de terminaison retourne des données sensibles qui pourraient être excessives. Si cette API est consommée par un client qui n'a pas besoin de tous ces détails, cela viole le principe de moindre privilège.\n\n⚠️ **FAUX POSITIFS PROBABLES : Validation manuelle requise.** S'il s'agit d'une API interne conçue pour retourner des enregistrements complets (ex: panel d'administration), cela peut être légitime. Cependant, si c'est une API exposée publiquement, assurez-vous d'implémenter un masquage de données (Data Masking) ou d'utiliser des DTO stricts.
rem.CWE_201=Examinez les champs exposés. Si l'application cliente n'a pas besoin de ces données pour fonctionner, supprimez les champs de la réponse en utilisant des Data Transfer Objects (DTO) dédiés ou appliquez un masquage de données.

# CWE-209
cwe.CWE_209=Génération d'un message d'erreur contenant des informations sensibles
desc.CWE_209=Le point de terminaison renvoie des messages d'erreur détaillés ou des traces de pile lors du traitement d'une entrée non valide.
rem.CWE_209=Interceptez les exceptions côté serveur et renvoyez des messages d'erreur génériques à l'utilisateur. Ne divulguez jamais de stack traces en production. Assurez-vous que les API renvoient les détails des erreurs dans des formats structurés (comme JSON) plutôt qu'en texte brut. S'il s'agit d'une API Spring renvoyant un Content-Type: text/plain, il est recommandé de supprimer la gestion manuelle via @ExceptionHandler au profit de celle par défaut de Spring, sauf contrainte métier ou technique. Si la gestion d'un @ExceptionHandler est obligatoire, assurez-vous qu'il renvoie un objet structuré (comme une Map ou un ErrorDTO) au lieu d'une String brute pour permettre la conversion JSON.

# CWE-285
cwe.CWE_285=Autorisation incorrecte
desc.CWE_285=Le point de terminaison n'applique pas correctement les contrôles d'autorisation, permettant l'accès à des fonctionnalités restreintes.
rem.CWE_285=Implémentez des contrôles d'autorisation robustes pour vérifier que l'utilisateur authentifié possède les privilèges requis pour l'action demandée.

# CWE-287
cwe.CWE_287=Authentification incorrecte
desc.CWE_287=Le point de terminaison accepte les requêtes sans autorisation (ou mal formées), mais a retourné un code de succès 2xx.
rem.CWE_287=Mettez en place un mécanisme d'authentification robuste (ex: JWT, OAuth2) pour tous les points de terminaison sensibles.

# CWE-306
cwe.CWE_306=Authentification manquante pour une fonction critique
desc.CWE_306=Le point de terminaison expose des opérations sensibles sans exiger d'authentification.
rem.CWE_306=Exigez une authentification pour ce point de terminaison et rejetez les requêtes non authentifiées avec un code 401 Unauthorized.

# CWE-307
cwe.CWE_307=Restriction incorrecte des tentatives d'authentification excessives
desc.CWE_307=Le point de terminaison ne semble pas appliquer de limitation de débit (rate limiting).
rem.CWE_307=Mettez en place un mécanisme de limitation de débit (rate limiting) pour restreindre le nombre de requêtes par IP ou par utilisateur sur une période donnée.

# CWE-319
cwe.CWE_319=Transmission en clair d'informations sensibles
desc.CWE_319=Le point de terminaison transmet des informations sensibles (comme des identifiants, des jetons ou des données personnelles) sans chiffrement TLS.
rem.CWE_319=Utilisez systématiquement le protocole HTTPS (TLS 1.2 minimum) pour chiffrer les communications entre le client et le serveur.

# CWE-327
cwe.CWE_327=Utilisation d'un algorithme cryptographique cassé ou risqué
desc.CWE_327=L'application utilise un algorithme cryptographique cassé, risqué ou obsolète.
rem.CWE_327=Remplacez les algorithmes cryptographiques faibles par des alternatives modernes et robustes recommandées par l'industrie (ex: AES-GCM, SHA-256).

# CWE-346
cwe.CWE_346=Erreur de validation de l'origine
desc.CWE_346=La politique CORS autorise les requêtes provenant de n'importe quelle origine.
rem.CWE_346=Restreignez l'en-tête 'Access-Control-Allow-Origin' à une liste spécifique de domaines de confiance. Évitez d'utiliser le caractère générique (*).

# CWE-347
cwe.CWE_347=Vérification incorrecte de la signature cryptographique
desc.CWE_347=Le point de terminaison ne vérifie pas correctement les signatures cryptographiques, ce qui peut permettre la falsification des données.
rem.CWE_347=Assurez-vous que toutes les signatures cryptographiques sont strictement vérifiées avec les bonnes clés publiques ou secrets partagés avant de traiter les données.

# CWE-352
cwe.CWE_352=Falsification de requête intersite (CSRF)
desc.CWE_352=L'application n'implémente pas de protections adéquates contre les falsifications de requêtes intersites (CSRF).
rem.CWE_352=Implémentez des jetons Anti-CSRF pour toutes les opérations modifiant l'état ou utilisez des cookies SameSite strictement configurés.

# CWE-400
cwe.CWE_400=Consommation incontrôlée des ressources
desc.CWE_400=Le point de terminaison est vulnérable à une consommation incontrôlée des ressources, ce qui peut mener à un déni de service (DoS).
rem.CWE_400=Implémentez des limites de ressources, validez la taille des entrées et appliquez un throttling pour éviter la surconsommation du CPU, de la mémoire ou du stockage.

# CWE-434
cwe.CWE_434=Téléversement non restreint de fichiers d'un type dangereux
desc.CWE_434=Le point de terminaison permet le téléchargement de fichiers de types dangereux sans restrictions adéquates.
rem.CWE_434=Validez strictement les fichiers téléchargés en vérifiant leur contenu, limitez les extensions via une liste blanche et stockez-les en dehors du répertoire web.

# CWE-444
cwe.CWE_444=Interprétation incohérente des requêtes HTTP ('HTTP Request Smuggling')
desc.CWE_444=L'application est vulnérable à la contrebande de requêtes HTTP (Request Smuggling) en raison d'une interprétation incohérente entre les serveurs front-end et back-end.
rem.CWE_444=Assurez-vous que tous les serveurs interprètent les requêtes de manière cohérente. Envisagez de passer à HTTP/2, qui empêche ces attaques par conception.

# CWE-502
cwe.CWE_502=Désérialisation de données non approuvées
desc.CWE_502=Le point de terminaison accepte les JWT signés avec un secret vide (blank).
rem.CWE_502=Configurez la validation JWT pour exiger une clé secrète forte et refusez les jetons signés avec un secret vide ou absent.

# CWE-521
cwe.CWE_521=Exigences de mot de passe faibles
desc.CWE_521=Le point de terminaison d'authentification permet aux utilisateurs de s'authentifier à l'aide de mots de passe facilement devinables ou extrêmement communs.
rem.CWE_521=Mettez en œuvre des exigences strictes en matière de complexité des mots de passe et un mécanisme de verrouillage de compte ou une limitation du débit pour empêcher les attaques par force brute.

# CWE-598
cwe.CWE_598=Exposition d'informations sensibles via les chaînes de requête GET
desc.CWE_598=Des informations sensibles sont transmises dans la chaîne de requête de l'URL (Query String).
rem.CWE_598=Transmettez les données sensibles dans le corps de la requête HTTP (ex: via POST) plutôt que dans l'URL, car ces dernières sont souvent journalisées.

# CWE-601
cwe.CWE_601=Redirection d'URL vers un site non approuvé ('Open Redirect')
desc.CWE_601=Le point de terminaison accepte une entrée contrôlée par l'utilisateur pour déterminer la cible d'une redirection HTTP.
rem.CWE_601=Ne redirigez jamais les utilisateurs vers des URL fournies dynamiquement sans validation stricte. Utilisez des identifiants internes mappés à des URL statiques sécurisées.

# CWE-611
cwe.CWE_611=Restriction incorrecte d'une référence d'entité externe XML (XXE)
desc.CWE_611=L'analyseur XML ne restreint pas correctement les entités externes XML, conduisant à une injection XXE.
rem.CWE_611=Désactivez complètement la résolution des entités externes (XXE) et des DTD dans la configuration de l'analyseur XML.

# CWE-614
cwe.CWE_614=Cookie sensible dans une session HTTPS sans l'attribut 'Secure'
desc.CWE_614=Cookie sensible dans une session HTTPS sans l'attribut 'Secure'.
rem.CWE_614=Configurer le flag 'Secure' sur tous les cookies de session pour empêcher leur transmission en clair.

# CWE-639
cwe.CWE_639=Contournement d'autorisation via une clé contrôlée par l'utilisateur (BOLA)
desc.CWE_639=L'utilisateur A a pu accéder aux données appartenant à l'utilisateur B en manipulant les identifiants d'objet dans la requête.
rem.CWE_639=Vérifiez que l'utilisateur authentifié a bien les droits d'accès pour la ressource demandée, et ne vous fiez pas uniquement à l'identifiant fourni dans l'URL.

# CWE-650
cwe.CWE_650=Confiance dans les méthodes de permission HTTP côté serveur
desc.CWE_650=Le serveur traite avec succès les requêtes utilisant une méthode HTTP inhabituelle, ce qui pourrait mener à des contournements.
rem.CWE_650=Rejetez explicitement les méthodes HTTP non autorisées ou inhabituelles (ex: TRACE, TRACK) avec un code 405 Method Not Allowed.

# CWE-693
cwe.CWE_693=Échec du mécanisme de protection
desc.CWE_693=Un en-tête de sécurité HTTP recommandé est manquant dans la réponse.
rem.CWE_693=Configurez les en-têtes de sécurité HTTP appropriés (Strict-Transport-Security, X-Frame-Options, X-Content-Type-Options, Content-Security-Policy).

# CWE-770
cwe.CWE_770=Allocation de ressources sans limites ou limitation (DoS)
desc.CWE_770=L'application alloue des ressources sans limites appropriées, pouvant causer un épuisement des ressources.
rem.CWE_770=Définissez et appliquez des limites strictes sur l'allocation des ressources (ex: taille max du payload, nombre max de résultats) pour chaque requête.

# CWE-799
cwe.CWE_799=Contrôle incorrect de la fréquence d'interaction
desc.CWE_799=L'application ne limite pas correctement la fréquence des interactions d'un utilisateur ou d'une adresse IP.
rem.CWE_799=Mettez en place un mécanisme de limitation de débit (rate limiting) pour prévenir les abus automatisés et les attaques par force brute.

# CWE-913
cwe.CWE_913=Contrôle incorrect des ressources de code gérées dynamiquement
desc.CWE_913=Le point de terminaison accepte les JWT signés avec l'algorithme 'none', permettant de contourner l'authentification.
rem.CWE_913=Configurez votre bibliothèque JWT pour rejeter explicitement l'algorithme 'none' et vérifier systématiquement la signature avec une clé sécurisée.

# CWE-915
cwe.CWE_915=Modification incorrectement contrôlée des attributs d'objet déterminés dynamiquement ('Mass Assignment')
desc.CWE_915=Le point de terminaison accepte des champs inattendus (ex: 'is_admin', 'role') dans le payload JSON sans renvoyer d'erreur de validation.
rem.CWE_915=Désactivez l'affectation en masse (mass assignment) ou utilisez des Data Transfer Objects (DTO) stricts pour valider uniquement les champs autorisés.

# CWE-918
cwe.CWE_918=Falsification de requête côté serveur (SSRF)
desc.CWE_918=Le point de terminaison semble vulnérable au SSRF. Il a récupéré des données depuis le service de métadonnées interne AWS.
rem.CWE_918=Validez les URL fournies par les utilisateurs avec une liste blanche de domaines autorisés et bloquez l'accès aux adresses IP internes (ex: 169.254.169.254, 127.0.0.1).

# CWE-942
cwe.CWE_942=Politique inter-domaines trop permissive avec des domaines non approuvés
desc.CWE_942=L'application utilise une politique cross-domain permissive faisant confiance à des domaines non fiables.
rem.CWE_942=Restreignez les politiques cross-domain (comme CORS) uniquement aux domaines explicitement fiables, et évitez les jokers (*) pour les endpoints sensibles.

# CWE-943
cwe.CWE_943=Neutralisation incorrecte des éléments spéciaux dans la logique de requête de données
desc.CWE_943=Le point de terminaison pourrait être vulnérable à une injection NoSQL (ex: MongoDB).
rem.CWE_943=N'insérez pas directement les données utilisateur dans les requêtes de base de données. Utilisez les fonctionnalités de requêtage sécurisées fournies par votre client NoSQL.

# CWE-1004
cwe.CWE_1004=Cookie sensible sans l'attribut 'HttpOnly'
desc.CWE_1004=Un cookie sensible est défini sans l'attribut 'HttpOnly', l'exposant aux scripts côté client.
rem.CWE_1004=Ajoutez l'attribut 'HttpOnly' à tous les cookies sensibles (comme les identifiants de session) pour empêcher leur accès via JavaScript.

# CWE-1021
cwe.CWE_1021=Restriction incorrecte des couches de rendu de l'interface utilisateur ou des cadres
desc.CWE_1021=L'application est vulnérable au détournement d'interface (Clickjacking) car elle ne restreint pas son intégration dans des frames.
rem.CWE_1021=Implémentez les en-têtes X-Frame-Options ou Content-Security-Policy (frame-ancestors) pour empêcher le site d'être intégré dans des frames non autorisées.

# CWE-1275
cwe.CWE_1275=Cookie sensible avec un attribut 'SameSite' incorrect
desc.CWE_1275=Un cookie sensible n'a pas d'attribut SameSite correctement configuré, augmentant le risque de CSRF.
rem.CWE_1275=Configurez l'attribut 'SameSite' à 'Strict' ou 'Lax' pour tous les cookies sensibles afin de protéger contre les attaques CSRF.

# CWE-1336
cwe.CWE_1336=Neutralisation incorrecte des éléments spéciaux utilisés dans un moteur de template
desc.CWE_1336=Le point de terminaison évalue l'entrée utilisateur comme du code de template, permettant l'exécution de code arbitraire sur le serveur.
rem.CWE_1336=N'utilisez jamais d'entrées utilisateur directement dans l'évaluation d'un template. Utilisez des moteurs de template sans logique ou exécutez-les dans un environnement bac à sable sécurisé.

