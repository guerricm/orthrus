report.methodology.description=Ce rapport présente les résultats d'une analyse automatisée de sécurité dynamique (DAST). L'analyse a consisté à envoyer divers payloads malveillants et des entrées inattendues à l'API cible afin d'identifier les vulnérabilités de sécurité.
report.methodology.details=Orthrus utilise une taxonomie avancée pour catégoriser ses découvertes.<ul><li><strong>Score CVSS 3.1 Base :</strong> Fournit un score numérique théorique (0.0 à 10.0) reflétant les qualités intrinsèques de la vulnérabilité.</li><li><strong>CAPEC :</strong> Common Attack Pattern Enumeration and Classification, identifiant le mécanisme exact de l'attaque.</li><li><strong>OWASP :</strong> Lie chaque vulnérabilité au classement de sécurité API Top 10 le plus récent.</li><li><strong>Note de Sécurité Globale :</strong> Une note (de A à F) évaluant la posture globale de sécurité, basée sur la vulnérabilité de plus haute criticité trouvée.</li></ul>
