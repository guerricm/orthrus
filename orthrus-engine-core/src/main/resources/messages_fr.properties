# CWE-114
cwe.CWE_114=Process Control
desc.CWE_114=L'application est vulnérable à l'injection d'en-tête Host (Host Header Injection), ce qui peut conduire à un empoisonnement du cache ou un contrôle de processus.
rem.CWE_114=Ne faites pas confiance à l'en-tête Host ou X-Forwarded-Host. Utilisez une liste blanche (allowlist) configurée de manière sécurisée pour les domaines de confiance.

# CWE-235
cwe.CWE_235=Gestion incorrecte des paramètres supplémentaires
desc.CWE_235=L'application est vulnérable à la pollution de paramètres HTTP (HPP). L'envoi de paramètres dupliqués a provoqué un comportement anormal.
rem.CWE_235=Assurez-vous que l'application gère les paramètres dupliqués en toute sécurité. Les frameworks doivent s'attendre à des tableaux si plusieurs valeurs sont autorisées, ou rejeter strictement les clés dupliquées.

# CWE-644
cwe.CWE_644=Neutralisation incorrecte des en-têtes HTTP pour la syntaxe de script
desc.CWE_644=L'application ne neutralise pas les en-têtes HTTP, la rendant vulnérable aux attaques d'injection d'en-tête Host.
rem.CWE_644=Validez et nettoyez tous les en-têtes HTTP. Évitez de refléter l'en-tête Host dans les liens, les réinitialisations de mot de passe ou les clés de cache sans validation stricte par liste blanche.
