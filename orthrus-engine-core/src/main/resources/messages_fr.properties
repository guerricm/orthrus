report.disclaimer.title=Avertissement Légal & Confidentialité
report.disclaimer.text=Ce rapport est STRICTEMENT CONFIDENTIEL et sa distribution est soumise à restriction. Il est destiné uniquement au personnel autorisé. Il est généré par un outil automatisé de test de sécurité (Orthrus). L'outil assigne un score CVSS de Base théorique qui peut ne pas refléter le contexte environnemental ou temporel de la vulnérabilité. Les auteurs et l'outil lui-même déclinent toute responsabilité en cas de vulnérabilité non détectée, de failles critiques manquées, ou de compromissions ultérieures des systèmes testés. Cet outil est fourni exclusivement pour des tests de sécurité autorisés et encadrés.
rem.CWE_693=Configurez les en-têtes de sécurité HTTP appropriés (Strict-Transport-Security, X-Frame-Options, X-Content-Type-Options, Content-Security-Policy).
rem.CWE_650=Rejetez explicitement les méthodes HTTP non autorisées ou inhabituelles (ex: TRACE, TRACK) avec un code 405 Method Not Allowed.
rem.CWE_307=Mettez en place un mécanisme de limitation de débit (rate limiting) pour restreindre le nombre de requêtes par IP ou par utilisateur sur une période donnée.
rem.CWE_20=Validez strictement l'en-tête Content-Type de la requête et refusez (415 Unsupported Media Type) les formats inattendus.
rem.CWE_913=Configurez votre bibliothèque JWT pour rejeter explicitement l'algorithme 'none' et vérifier systématiquement la signature avec une clé sécurisée.
rem.CWE_502=Configurez la validation JWT pour exiger une clé secrète forte et refusez les jetons signés avec un secret vide ou absent.

