severity.desc.critical=Les vulnérabilités critiques indiquent une menace grave et immédiate pour la sécurité de l'application. Elles peuvent généralement être exploitées sans authentification et entraîner une compromission totale du système ou une fuite de données majeure. Une correction immédiate est requise.
severity.desc.high=Les vulnérabilités de niveau élevé représentent une menace significative. Elles nécessitent souvent un certain niveau d'accès ou une exploitation complexe, mais peuvent entraîner un vol de données majeur ou une perturbation du système. Elles doivent être traitées en priorité haute.
severity.desc.medium=Les vulnérabilités moyennes représentent une menace modérée. Elles nécessitent généralement des conditions préalables spécifiques ou un accès autorisé pour être exploitées. Elles doivent être corrigées lors de la prochaine mise à jour.
severity.desc.low=Les vulnérabilités faibles ont un impact minime. Elles peuvent exposer des informations non sensibles ou nécessiter des scénarios très improbables pour être exploitées. Elles doivent être traitées lorsque les ressources le permettent.
severity.desc.info=Les observations informatives ne représentent pas une vulnérabilité directe, mais soulignent des bonnes pratiques de sécurité qui pourraient être améliorées pour renforcer la posture globale.

report.summary.rating=Note Globale de Risque
report.summary.keystats=Statistiques Clés

grade.title=Définition de la Note de Sécurité
grade.a.desc=Excellente posture de sécurité. Aucune vulnérabilité élevée ou critique détectée.
grade.b.desc=Bonne posture de sécurité. Des vulnérabilités mineures sont présentes, mais aucune menace critique immédiate.
grade.c.desc=Posture de sécurité passable. Plusieurs vulnérabilités moyennes ou une seule vulnérabilité élevée nécessitent une attention particulière.
grade.d.desc=Médiocre posture de sécurité. Plusieurs vulnérabilités élevées détectées. Une correction urgente est nécessaire.
grade.f.desc=Échec critique. Une ou plusieurs vulnérabilités critiques détectées, exposant l'application à des risques immédiats et sévères.

