report.summary.cvss.desc=Chaque découverte est notée sous CVSS v3.1 (pour la parité avec NVD, CISA KEV et la plupart des avis des fournisseurs) et CVSS v4.0 (norme FIRST actuelle depuis novembre 2023). Les bandes de sévérité sont identiques pour les deux versions. Les entrées détaillées incluent les vecteurs complets v3.1 et v4.0. Les scores reflètent ce qui a été enregistré lors de l'évaluation initiale ; les vecteurs sont documentés pour la reproductibilité par rapport au calculateur CVSS du FIRST.
