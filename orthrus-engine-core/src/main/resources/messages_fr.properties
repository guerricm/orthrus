grade.title=Définition de la Note de Sécurité
grade.a.desc=Excellente posture de sécurité. Aucune vulnérabilité élevée ou critique détectée.
grade.b.desc=Bonne posture de sécurité. Des vulnérabilités mineures sont présentes, mais aucune menace critique immédiate.
grade.c.desc=Posture de sécurité passable. Plusieurs vulnérabilités moyennes ou une seule vulnérabilité élevée nécessitent une attention particulière.
grade.d.desc=Médiocre posture de sécurité. Plusieurs vulnérabilités élevées détectées. Une correction urgente est nécessaire.
grade.f.desc=Échec critique. Une ou plusieurs vulnérabilités critiques détectées, exposant l'application à des risques immédiats et sévères.

