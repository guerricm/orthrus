# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Package

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'liberica'
        cache: 'maven'
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        settings-path: ${{ github.workspace }} # location for the settings.xml file
        
    - name: Extract Version
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=revision -q -DforceStdout)
        echo "CLEAN_VERSION=${VERSION%-SNAPSHOT}" >> $GITHUB_ENV

    - name: Build with Maven
      run: |
        mvn clean package spring-boot:build-image \
          -Drevision=${{ env.CLEAN_VERSION }}-${{ github.run_number }} \
          -Dspring-boot.build-image.publish=true \
          -DCI_REGISTRY_USER=${{ secrets.DOCKERHUB_USER }} \
          -DCI_REGISTRY_PASSWORD=${{ secrets.DOCKERHUB_PASSWORD }} \
          -Ddockerhub.user=${{ secrets.DOCKERHUB_USER }} \
          --no-transfer-progress