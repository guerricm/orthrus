<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main}, 'Orthrus DAST - Scan History')}">
<body>
<main>
    <div class="row justify-content-center">
        <div class="col-lg-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Scan History</h2>
                <a href="/scans/new" class="btn btn-primary">Start New Scan</a>
            </div>

            <div th:if="${history == null or history.isEmpty()}" class="alert alert-info bg-transparent border-info text-light d-flex align-items-center" role="alert">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-info-circle-fill me-3 flex-shrink-0" viewBox="0 0 16 16">
                  <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16m.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2"/>
                </svg>
                <div>
                  No scans have been executed yet in this session.
                </div>
            </div>

            <div class="glass-card" style="padding: 0; overflow: hidden;" th:if="${history != null and !history.isEmpty()}">
                <table class="table table-hover table-dark mb-0" style="background: transparent;">
                    <thead>
                        <tr>
                            <th class="bg-transparent border-secondary" style="padding: 1rem;">Job ID</th>
                            <th class="bg-transparent border-secondary" style="padding: 1rem;">Date</th>
                            <th class="bg-transparent border-secondary" style="padding: 1rem;">Target</th>
                            <th class="bg-transparent border-secondary" style="padding: 1rem;">Status</th>
                            <th class="bg-transparent border-secondary" style="padding: 1rem;">Duration</th>
                            <th class="bg-transparent border-secondary text-center" style="padding: 1rem;">Vulns</th>
                            <th class="bg-transparent border-secondary text-center" style="padding: 1rem;">Tests</th>
                            <th class="bg-transparent border-secondary text-end" style="padding: 1rem;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="scan-table-body">
                        <th:block th:replace="~{fragments/scan-items :: items}"></th:block>
                    </tbody>
                </table>
                <div id="loading-spinner" class="text-center py-3 d-none">
                    <div class="spinner-border text-light" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let page = 1;
            let isLoading = false;
            let hasMore = true;
            
            const tableBody = document.getElementById('scan-table-body');
            const spinner = document.getElementById('loading-spinner');
            
            // Create a sentinel element at the bottom of the table
            const sentinel = document.createElement('div');
            sentinel.id = 'scroll-sentinel';
            sentinel.style.height = '1px';
            document.querySelector('.glass-card').appendChild(sentinel);

            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !isLoading && hasMore) {
                    loadMoreScans();
                }
            }, { rootMargin: '100px' });
            
            observer.observe(sentinel);
            
            function loadMoreScans() {
                isLoading = true;
                spinner.classList.remove('d-none');
                
                fetch(`/api/scans?page=${page}&size=10`)
                    .then(response => {
                        if (!response.ok) throw new Error('Network error');
                        return response.text();
                    })
                    .then(html => {
                        if (html.trim() === '') {
                            hasMore = false; // No more results
                            observer.disconnect();
                        } else {
                            tableBody.insertAdjacentHTML('beforeend', html);
                            // Process newly added elements for HTMX (if any are polling)
                            if (window.htmx) {
                                window.htmx.process(tableBody);
                            }
                            page++;
                        }
                    })
                    .catch(err => {
                        console.error('Failed to fetch scans:', err);
                        hasMore = false;
                    })
                    .finally(() => {
                        isLoading = false;
                        spinner.classList.add('d-none');
                    });
            }
        });
    </script>
</main>
</body>
</html>
