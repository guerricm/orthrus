<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::div.container-fluid}, '401 Unauthorized - Orthrus DAST')}">

<body>

    <div class="container-fluid py-5 animate-fade-in d-flex justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="glass-card text-center p-5" style="max-width: 600px; border-top: 4px solid var(--grade-d);">
            <div class="mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="var(--grade-d)" class="bi bi-person-fill-lock" viewBox="0 0 16 16">
                  <path d="M11 5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm-9 8c0 1 1 1 1 1h5v-1a1.9 1.9 0 0 1 .01-.2 4.49 4.49 0 0 1 1.534-3.693C9.077 9.038 8.564 9 8 9c-5 0-6 3-6 4Zm7 0a1 1 0 0 1 1-1v-1a2 2 0 1 1 4 0v1a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-2Zm3-3a1 1 0 0 0-1 1v1h2v-1a1 1 0 0 0-1-1Z"/>
                </svg>
            </div>
            <h1 class="display-4 text-light fw-bold mb-3">401</h1>
            <h3 class="text-warning mb-4">Unauthorized</h3>
            <p class="text-muted mb-4">
                Authentication is required to access this resource. Your session may have expired or your login was incomplete.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <a href="/login" class="btn btn-primary px-4 py-2">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </a>
                <a href="/" class="btn btn-outline-light px-4 py-2">
                    <i class="bi bi-house-door me-2"></i>Return Home
                </a>
            </div>
        </div>
    </div>

</body>

</html>
